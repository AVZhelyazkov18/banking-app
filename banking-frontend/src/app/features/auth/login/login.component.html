<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card p-4 shadow-sm">
      <h3 class="mb-3">Login</h3>
      <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" formControlName="email"
            [class.is-invalid]="form.get('email')!.invalid && form.get('email')!.touched">
          <div class="invalid-feedback">
            <span *ngIf="form.get('email')!.errors?.['required']">Email is required.</span>
            <span *ngIf="form.get('email')!.errors?.['email']">Enter a valid email address.</span>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" formControlName="password"
            [class.is-invalid]="form.get('password')!.invalid && form.get('password')!.touched">
          <div class="invalid-feedback">Password is required.</div>
        </div>
        <button type="submit" class="btn btn-primary w-100" [disabled]="form.invalid">Login</button>
      </form>
      <p class="mt-3 text-center">No account? <a routerLink="/register">Register</a></p>
    </div>
  </div>
</div>
