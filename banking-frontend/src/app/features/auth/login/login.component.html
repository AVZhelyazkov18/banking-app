<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo"><i class="bi bi-bank2"></i> Banking<span>App</span></div>
    <p class="auth-subtitle">Sign in to your account</p>

    <div *ngIf="errorMessage" class="alert alert-danger py-2 small">{{ errorMessage }}</div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">Email address</label>
        <div class="input-group" [class.is-invalid]="form.get('email')!.invalid && form.get('email')!.touched">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" formControlName="email" placeholder="you@example.com"
            [class.is-invalid]="form.get('email')!.invalid && form.get('email')!.touched">
        </div>
        <div class="invalid-feedback d-block" *ngIf="form.get('email')!.invalid && form.get('email')!.touched">
          <span *ngIf="form.get('email')!.errors?.['required']">Email is required.</span>
          <span *ngIf="form.get('email')!.errors?.['email']">Enter a valid email address.</span>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-group" [class.is-invalid]="form.get('password')!.invalid && form.get('password')!.touched">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" formControlName="password" placeholder="••••••••"
            [class.is-invalid]="form.get('password')!.invalid && form.get('password')!.touched">
        </div>
        <div class="invalid-feedback d-block" *ngIf="form.get('password')!.invalid && form.get('password')!.touched">
          Password is required.
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2" [disabled]="form.invalid">
        <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
      </button>
    </form>

    <p class="mt-3 text-center small text-muted">No account? <a routerLink="/register">Create one</a></p>
  </div>
</div>
