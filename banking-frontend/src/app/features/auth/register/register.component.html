<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo"><i class="bi bi-bank2"></i> Banking<span>App</span></div>
    <p class="auth-subtitle">Create your account</p>

    <div *ngIf="errorMessage" class="alert alert-danger py-2 small">{{ errorMessage }}</div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <!-- Account Credentials -->
      <div class="mb-3">
        <label class="form-label">Email address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" formControlName="email" placeholder="you@example.com"
            [class.is-invalid]="form.get('email')!.invalid && form.get('email')!.touched">
        </div>
        <div class="invalid-feedback d-block" *ngIf="form.get('email')!.invalid && form.get('email')!.touched">
          <span *ngIf="form.get('email')!.errors?.['required']">Email is required.</span>
          <span *ngIf="form.get('email')!.errors?.['email']">Enter a valid email address.</span>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" formControlName="password" placeholder="Min. 8 characters"
            [class.is-invalid]="form.get('password')!.invalid && form.get('password')!.touched">
        </div>
        <div class="invalid-feedback d-block" *ngIf="form.get('password')!.invalid && form.get('password')!.touched">
          <span *ngIf="form.get('password')!.errors?.['required']">Password is required.</span>
          <span *ngIf="form.get('password')!.errors?.['minlength']">Minimum 8 characters.</span>
        </div>
      </div>

      <!-- Divider -->
      <hr class="my-3">
      <p class="text-muted small mb-3" style="font-size:0.8rem;letter-spacing:0.5px;text-transform:uppercase;">Personal Identity</p>

      <div class="row">
        <div class="col-6 mb-3">
          <label class="form-label">First Name</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" formControlName="firstName" placeholder="First name"
              [class.is-invalid]="form.get('firstName')!.invalid && form.get('firstName')!.touched">
          </div>
          <div class="invalid-feedback d-block" *ngIf="form.get('firstName')!.invalid && form.get('firstName')!.touched">
            <span *ngIf="form.get('firstName')!.errors?.['required']">Required.</span>
            <span *ngIf="form.get('firstName')!.errors?.['minlength']">Min. 2 chars.</span>
          </div>
        </div>
        <div class="col-6 mb-3">
          <label class="form-label">Last Name</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" formControlName="lastName" placeholder="Last name"
              [class.is-invalid]="form.get('lastName')!.invalid && form.get('lastName')!.touched">
          </div>
          <div class="invalid-feedback d-block" *ngIf="form.get('lastName')!.invalid && form.get('lastName')!.touched">
            <span *ngIf="form.get('lastName')!.errors?.['required']">Required.</span>
            <span *ngIf="form.get('lastName')!.errors?.['minlength']">Min. 2 chars.</span>
          </div>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">EGN / PIN <span class="text-muted small">(10 digits)</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
          <input type="text" class="form-control font-monospace" formControlName="pin" placeholder="0000000000"
            [class.is-invalid]="form.get('pin')!.invalid && form.get('pin')!.touched">
        </div>
        <div class="invalid-feedback d-block" *ngIf="form.get('pin')!.invalid && form.get('pin')!.touched">
          <span *ngIf="form.get('pin')!.errors?.['required']">EGN is required.</span>
          <span *ngIf="form.get('pin')!.errors?.['pattern']">Must be exactly 10 digits.</span>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Phone <span class="text-muted small">(optional)</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-telephone"></i></span>
          <input type="text" class="form-control" formControlName="phone" placeholder="+359 88 888 8888">
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label">Address <span class="text-muted small">(optional)</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
          <input type="text" class="form-control" formControlName="address" placeholder="City, Street">
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2" [disabled]="form.invalid">
        <i class="bi bi-person-plus me-1"></i>Register
      </button>
    </form>

    <p class="mt-3 text-center small text-muted">Have an account? <a routerLink="/login">Sign in</a></p>
  </div>
</div>
