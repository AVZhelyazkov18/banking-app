<div class="row justify-content-center mt-2">
  <div class="col-lg-5 col-md-7">
    <div class="card">
      <div class="card-header-accent">
        <i class="bi bi-calendar-check me-2"></i>{{ isEditMode ? 'Edit Payment Plan' : 'Create Payment Plan' }}
      </div>
      <div class="card-body p-4">
        <div *ngIf="errorMessage" class="alert alert-danger py-2 small">{{ errorMessage }}</div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label">Date</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-calendar-date"></i></span>
              <input type="date" class="form-control" formControlName="date"
                [class.is-invalid]="form.get('date')!.invalid && form.get('date')!.touched">
            </div>
            <div class="invalid-feedback d-block" *ngIf="form.get('date')!.invalid && form.get('date')!.touched">
              Date is required.
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Contribution Amount</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-currency-euro"></i></span>
              <input type="number" step="0.01" class="form-control" formControlName="contributionAmount" placeholder="0.00"
                [class.is-invalid]="form.get('contributionAmount')!.invalid && form.get('contributionAmount')!.touched">
            </div>
            <div class="invalid-feedback d-block" *ngIf="form.get('contributionAmount')!.invalid && form.get('contributionAmount')!.touched">
              <span *ngIf="form.get('contributionAmount')!.errors?.['required']">Contribution amount is required.</span>
              <span *ngIf="form.get('contributionAmount')!.errors?.['min']">Must be at least 0.</span>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Principal Portion</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-pie-chart"></i></span>
              <input type="number" step="0.01" class="form-control" formControlName="principalPortion" placeholder="0.00"
                [class.is-invalid]="form.get('principalPortion')!.invalid && form.get('principalPortion')!.touched">
            </div>
            <div class="invalid-feedback d-block" *ngIf="form.get('principalPortion')!.invalid && form.get('principalPortion')!.touched">
              <span *ngIf="form.get('principalPortion')!.errors?.['required']">Principal portion is required.</span>
              <span *ngIf="form.get('principalPortion')!.errors?.['min']">Must be at least 0.</span>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label">Interest Portion</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-percent"></i></span>
              <input type="number" step="0.01" class="form-control" formControlName="interestPortion" placeholder="0.00"
                [class.is-invalid]="form.get('interestPortion')!.invalid && form.get('interestPortion')!.touched">
            </div>
            <div class="invalid-feedback d-block" *ngIf="form.get('interestPortion')!.invalid && form.get('interestPortion')!.touched">
              <span *ngIf="form.get('interestPortion')!.errors?.['required']">Interest portion is required.</span>
              <span *ngIf="form.get('interestPortion')!.errors?.['min']">Must be at least 0.</span>
            </div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
              <i class="bi bi-check-lg me-1"></i>{{ isEditMode ? 'Save Changes' : 'Create' }}
            </button>
            <button type="button" class="btn btn-outline-secondary" (click)="cancel()">
              <i class="bi bi-x-lg me-1"></i>Cancel
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
