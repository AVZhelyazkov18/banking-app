<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Payment Plans</h3>
  <button class="btn btn-primary" (click)="create()">+ Create</button>
</div>

<div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

<table class="table table-striped table-hover">
  <thead>
    <tr>
      <th>#</th>
      <th>Date</th>
      <th>Contribution Amount</th>
      <th>Principal Portion</th>
      <th>Interest Portion</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let plan of paymentPlans; let i = index">
      <td>{{ i + 1 }}</td>
      <td>{{ plan.date }}</td>
      <td>{{ plan.contributionAmount }}</td>
      <td>{{ plan.principalPortion }}</td>
      <td>{{ plan.interestPortion }}</td>
      <td>
        <button class="btn btn-secondary btn-sm me-2" (click)="edit(plan.id ?? 0)">Edit</button>
        <button class="btn btn-danger btn-sm" (click)="delete(plan.id ?? 0)">Delete</button>
      </td>
    </tr>
    <tr *ngIf="paymentPlans.length === 0">
      <td colspan="6" class="text-center text-muted">No payment plans found.</td>
    </tr>
  </tbody>
</table>
