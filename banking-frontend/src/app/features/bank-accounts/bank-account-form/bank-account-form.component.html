<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="card p-4 shadow-sm">
      <h3 class="mb-3">Edit Bank Account</h3>
      <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
      <p class="text-muted">IBAN: <strong>{{ iban }}</strong></p>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Balance</label>
          <input type="number" class="form-control" formControlName="balance"
            [class.is-invalid]="form.get('balance')!.invalid && form.get('balance')!.touched">
          <div class="invalid-feedback">
            <span *ngIf="form.get('balance')!.errors?.['required']">Balance is required.</span>
            <span *ngIf="form.get('balance')!.errors?.['min']">Balance must be at least 0.</span>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Status</label>
          <select class="form-select" formControlName="status"
            [class.is-invalid]="form.get('status')!.invalid && form.get('status')!.touched">
            <option [ngValue]="true">Active</option>
            <option [ngValue]="false">Inactive</option>
          </select>
          <div class="invalid-feedback">Status is required.</div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary" [disabled]="form.invalid">Save Changes</button>
          <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>
