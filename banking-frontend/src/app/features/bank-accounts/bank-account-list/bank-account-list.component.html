<div class="page-header">
  <h3><i class="bi bi-bank me-2"></i>Bank Accounts</h3>
</div>

<div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

<div class="table-wrapper">
  <table class="table table-hover">
    <thead>
      <tr>
        <th>#</th>
        <th>IBAN</th>
        <th>Balance (EUR)</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let account of bankAccounts; let i = index">
        <td class="text-muted">{{ i + 1 }}</td>
        <td><span class="fw-semibold font-monospace small">{{ account.IBAN }}</span></td>
        <td class="fw-semibold">{{ account.balance | number:'1.2-2' }}</td>
        <td>
          <span [class]="account.status ? 'badge-active' : 'badge-inactive'">
            <i [class]="account.status ? 'bi bi-check-circle me-1' : 'bi bi-x-circle me-1'"></i>
            {{ account.status ? 'Active' : 'Inactive' }}
          </span>
        </td>
        <td>
          <button class="btn btn-outline-primary btn-sm me-1" (click)="edit(account.id)" title="Edit">
            <i class="bi bi-pencil"></i>
          </button>
          <button class="btn btn-outline-danger btn-sm" (click)="delete(account.id)" title="Delete">
            <i class="bi bi-trash"></i>
          </button>
        </td>
      </tr>
      <tr *ngIf="bankAccounts.length === 0">
        <td colspan="5" class="text-center text-muted py-4">
          <i class="bi bi-inbox fs-4 d-block mb-1 opacity-25"></i>No bank accounts found.
        </td>
      </tr>
    </tbody>
  </table>
</div>
