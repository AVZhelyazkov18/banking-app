<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Bank Accounts</h3>
</div>

<div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

<table class="table table-striped table-hover">
  <thead>
    <tr>
      <th>#</th>
      <th>IBAN</th>
      <th>Balance</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let account of bankAccounts; let i = index">
      <td>{{ i + 1 }}</td>
      <td>{{ account.IBAN }}</td>
      <td>{{ account.balance }}</td>
      <td>{{ account.status ? 'Active' : 'Inactive' }}</td>
      <td>
        <button class="btn btn-secondary btn-sm me-2" (click)="edit(account.id)">Edit</button>
        <button class="btn btn-danger btn-sm" (click)="delete(account.id)">Delete</button>
      </td>
    </tr>
    <tr *ngIf="bankAccounts.length === 0">
      <td colspan="5" class="text-center text-muted">No bank accounts found.</td>
    </tr>
  </tbody>
</table>
