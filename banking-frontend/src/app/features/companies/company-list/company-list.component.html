<div class="page-header">
  <h3><i class="bi bi-building me-2"></i>Companies</h3>
  <button class="btn btn-primary" (click)="create()">
    <i class="bi bi-plus-lg me-1"></i>Create
  </button>
</div>

<div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

<div class="table-wrapper">
  <table class="table table-hover">
    <thead>
      <tr>
        <th>#</th>
        <th>Company Name</th>
        <th>EIK</th>
        <th>Representative</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let company of companies; let i = index">
        <td class="text-muted">{{ i + 1 }}</td>
        <td class="fw-semibold">{{ company.companyName }}</td>
        <td><span class="font-monospace small">{{ company.eik }}</span></td>
        <td>{{ company.representative }}</td>
        <td>
          <button class="btn btn-outline-primary btn-sm me-1" (click)="edit(company.id ?? 0)" title="Edit">
            <i class="bi bi-pencil"></i>
          </button>
          <button class="btn btn-outline-danger btn-sm" (click)="delete(company.id ?? 0)" title="Delete">
            <i class="bi bi-trash"></i>
          </button>
        </td>
      </tr>
      <tr *ngIf="companies.length === 0">
        <td colspan="5" class="text-center text-muted py-4">
          <i class="bi bi-inbox fs-4 d-block mb-1 opacity-25"></i>No companies found.
        </td>
      </tr>
    </tbody>
  </table>
</div>
