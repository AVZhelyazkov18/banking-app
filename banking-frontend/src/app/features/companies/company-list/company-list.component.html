<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Companies</h3>
  <button class="btn btn-primary" (click)="create()">+ Create</button>
</div>

<div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

<table class="table table-striped table-hover">
  <thead>
    <tr>
      <th>#</th>
      <th>Company Name</th>
      <th>EIK</th>
      <th>Representative</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let company of companies; let i = index">
      <td>{{ i + 1 }}</td>
      <td>{{ company.companyName }}</td>
      <td>{{ company.eik }}</td>
      <td>{{ company.representative }}</td>
      <td>
        <!-- Edit/Delete use company.id when available; falls back to 0 until backend returns id -->
        <button class="btn btn-secondary btn-sm me-2" (click)="edit(company.id ?? 0)">Edit</button>
        <button class="btn btn-danger btn-sm" (click)="delete(company.id ?? 0)">Delete</button>
      </td>
    </tr>
    <tr *ngIf="companies.length === 0">
      <td colspan="5" class="text-center text-muted">No companies found.</td>
    </tr>
  </tbody>
</table>
