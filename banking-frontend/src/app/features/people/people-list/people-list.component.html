<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>People</h3>
  <button class="btn btn-primary" (click)="create()">+ Create</button>
</div>

<div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

<table class="table table-striped table-hover">
  <thead>
    <tr>
      <th>#</th>
      <th>First Name</th>
      <th>Last Name</th>
      <th>PIN</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let person of people; let i = index">
      <td>{{ i + 1 }}</td>
      <td>{{ person.firstName }}</td>
      <td>{{ person.lastName }}</td>
      <td>{{ person.pin }}</td>
      <td>
        <!-- Edit/Delete use person.id when available; falls back to 0 until backend returns id -->
        <button class="btn btn-secondary btn-sm me-2" (click)="edit(person.id ?? 0)">Edit</button>
        <button class="btn btn-danger btn-sm" (click)="delete(person.id ?? 0)">Delete</button>
      </td>
    </tr>
    <tr *ngIf="people.length === 0">
      <td colspan="5" class="text-center text-muted">No people found.</td>
    </tr>
  </tbody>
</table>
