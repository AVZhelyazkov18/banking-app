<div class="page-header">
  <h3><i class="bi bi-people me-2"></i>People</h3>
  <button class="btn btn-primary" (click)="create()">
    <i class="bi bi-plus-lg me-1"></i>Create
  </button>
</div>

<div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

<div class="table-wrapper">
  <table class="table table-hover">
    <thead>
      <tr>
        <th>#</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>PIN</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let person of people; let i = index">
        <td class="text-muted">{{ i + 1 }}</td>
        <td class="fw-semibold">{{ person.firstName }}</td>
        <td>{{ person.lastName }}</td>
        <td><span class="font-monospace small text-muted">{{ person.pin }}</span></td>
        <td>
          <button class="btn btn-outline-primary btn-sm me-1" (click)="edit(person.id ?? 0)" title="Edit">
            <i class="bi bi-pencil"></i>
          </button>
          <button class="btn btn-outline-danger btn-sm" (click)="delete(person.id ?? 0)" title="Delete">
            <i class="bi bi-trash"></i>
          </button>
        </td>
      </tr>
      <tr *ngIf="people.length === 0">
        <td colspan="5" class="text-center text-muted py-4">
          <i class="bi bi-inbox fs-4 d-block mb-1 opacity-25"></i>No people found.
        </td>
      </tr>
    </tbody>
  </table>
</div>
