<div class="row justify-content-center mt-2">
  <div class="col-lg-6 col-md-8">
    <div class="card">
      <div class="card-header-accent">
        <i class="bi bi-tags me-2"></i>{{ isEditMode ? 'Edit Loan Type' : 'Create Loan Type' }}
      </div>
      <div class="card-body p-4">
        <div *ngIf="errorMessage" class="alert alert-danger py-2 small">{{ errorMessage }}</div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label">Credit Name</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-tag"></i></span>
              <input type="text" class="form-control" formControlName="creditName" placeholder="e.g. Personal Loan"
                [class.is-invalid]="form.get('creditName')!.invalid && form.get('creditName')!.touched">
            </div>
            <div class="invalid-feedback d-block" *ngIf="form.get('creditName')!.invalid && form.get('creditName')!.touched">
              <span *ngIf="form.get('creditName')!.errors?.['required']">Credit name is required.</span>
              <span *ngIf="form.get('creditName')!.errors?.['minlength']">Minimum 2 characters.</span>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Min Disbursed Amount</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-currency-euro"></i></span>
                <input type="number" class="form-control" formControlName="creditDisbursedMin" placeholder="0"
                  [class.is-invalid]="form.get('creditDisbursedMin')!.invalid && form.get('creditDisbursedMin')!.touched">
              </div>
              <div class="invalid-feedback d-block" *ngIf="form.get('creditDisbursedMin')!.invalid && form.get('creditDisbursedMin')!.touched">
                Must be 0 or greater.
              </div>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Max Disbursed Amount</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-currency-euro"></i></span>
                <input type="number" class="form-control" formControlName="creditDisbursedMax" placeholder="0"
                  [class.is-invalid]="form.get('creditDisbursedMax')!.invalid && form.get('creditDisbursedMax')!.touched">
              </div>
              <div class="invalid-feedback d-block" *ngIf="form.get('creditDisbursedMax')!.invalid && form.get('creditDisbursedMax')!.touched">
                Must be 0 or greater.
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Min Term (months)</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-calendar"></i></span>
                <input type="number" class="form-control" formControlName="creditTermMin" placeholder="1"
                  [class.is-invalid]="form.get('creditTermMin')!.invalid && form.get('creditTermMin')!.touched">
              </div>
              <div class="invalid-feedback d-block" *ngIf="form.get('creditTermMin')!.invalid && form.get('creditTermMin')!.touched">
                Must be at least 1.
              </div>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Max Term (months)</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-calendar"></i></span>
                <input type="number" class="form-control" formControlName="creditTermMax" placeholder="1"
                  [class.is-invalid]="form.get('creditTermMax')!.invalid && form.get('creditTermMax')!.touched">
              </div>
              <div class="invalid-feedback d-block" *ngIf="form.get('creditTermMax')!.invalid && form.get('creditTermMax')!.touched">
                Must be at least 1.
              </div>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label">Interest Rate (%)</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-percent"></i></span>
              <input type="number" step="0.01" class="form-control" formControlName="creditInterestRate" placeholder="0.00"
                [class.is-invalid]="form.get('creditInterestRate')!.invalid && form.get('creditInterestRate')!.touched">
            </div>
            <div class="invalid-feedback d-block" *ngIf="form.get('creditInterestRate')!.invalid && form.get('creditInterestRate')!.touched">
              Must be 0 or greater.
            </div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
              <i class="bi bi-check-lg me-1"></i>{{ isEditMode ? 'Save Changes' : 'Create' }}
            </button>
            <button type="button" class="btn btn-outline-secondary" (click)="cancel()">
              <i class="bi bi-x-lg me-1"></i>Cancel
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
