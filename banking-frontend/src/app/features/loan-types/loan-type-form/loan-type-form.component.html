<div class="row justify-content-center mt-4">
  <div class="col-md-6">
    <div class="card p-4 shadow-sm">
      <h3 class="mb-3">{{ isEditMode ? 'Edit Loan Type' : 'Create Loan Type' }}</h3>
      <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Credit Name</label>
          <input type="text" class="form-control" formControlName="creditName"
            [class.is-invalid]="form.get('creditName')!.invalid && form.get('creditName')!.touched">
          <div class="invalid-feedback">
            <span *ngIf="form.get('creditName')!.errors?.['required']">Credit name is required.</span>
            <span *ngIf="form.get('creditName')!.errors?.['minlength']">Minimum 2 characters.</span>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Min Disbursed Amount</label>
          <input type="number" class="form-control" formControlName="creditDisbursedMin"
            [class.is-invalid]="form.get('creditDisbursedMin')!.invalid && form.get('creditDisbursedMin')!.touched">
          <div class="invalid-feedback">Must be 0 or greater.</div>
        </div>
        <div class="mb-3">
          <label class="form-label">Max Disbursed Amount</label>
          <input type="number" class="form-control" formControlName="creditDisbursedMax"
            [class.is-invalid]="form.get('creditDisbursedMax')!.invalid && form.get('creditDisbursedMax')!.touched">
          <div class="invalid-feedback">Must be 0 or greater.</div>
        </div>
        <div class="mb-3">
          <label class="form-label">Min Term (months)</label>
          <input type="number" class="form-control" formControlName="creditTermMin"
            [class.is-invalid]="form.get('creditTermMin')!.invalid && form.get('creditTermMin')!.touched">
          <div class="invalid-feedback">Must be at least 1.</div>
        </div>
        <div class="mb-3">
          <label class="form-label">Max Term (months)</label>
          <input type="number" class="form-control" formControlName="creditTermMax"
            [class.is-invalid]="form.get('creditTermMax')!.invalid && form.get('creditTermMax')!.touched">
          <div class="invalid-feedback">Must be at least 1.</div>
        </div>
        <div class="mb-3">
          <label class="form-label">Interest Rate (%)</label>
          <input type="number" step="0.01" class="form-control" formControlName="creditInterestRate"
            [class.is-invalid]="form.get('creditInterestRate')!.invalid && form.get('creditInterestRate')!.touched">
          <div class="invalid-feedback">Must be 0 or greater.</div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
            {{ isEditMode ? 'Save Changes' : 'Create' }}
          </button>
          <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>
