<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Loan Types</h3>
  <button class="btn btn-primary" (click)="create()">+ Create</button>
</div>

<div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

<table class="table table-striped table-hover">
  <thead>
    <tr>
      <th>#</th>
      <th>Credit Name</th>
      <th>Min Amount</th>
      <th>Max Amount</th>
      <th>Min Term</th>
      <th>Max Term</th>
      <th>Interest Rate (%)</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let lt of loanTypes; let i = index">
      <td>{{ i + 1 }}</td>
      <td>{{ lt.creditName }}</td>
      <td>{{ lt.creditDisbursedMin }}</td>
      <td>{{ lt.creditDisbursedMax }}</td>
      <td>{{ lt.creditTermMin }}</td>
      <td>{{ lt.creditTermMax }}</td>
      <td>{{ lt.creditInterestRate }}</td>
      <td>
        <button class="btn btn-secondary btn-sm me-2" (click)="edit(lt.id ?? 0)">Edit</button>
        <button class="btn btn-danger btn-sm" (click)="delete(lt.id ?? 0)">Delete</button>
      </td>
    </tr>
    <tr *ngIf="loanTypes.length === 0">
      <td colspan="8" class="text-center text-muted">No loan types found.</td>
    </tr>
  </tbody>
</table>
