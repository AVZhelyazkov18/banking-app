<div class="row justify-content-center mt-2">
  <div class="col-lg-5 col-md-7">
    <div class="card">
      <div class="card-header-accent">
        <i class="bi bi-credit-card me-2"></i>{{ isEditMode ? 'Edit Loan' : 'Create Loan' }}
      </div>
      <div class="card-body p-4">
        <div *ngIf="errorMessage" class="alert alert-danger py-2 small">{{ errorMessage }}</div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label">Amount Disbursed (EUR)</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-currency-euro"></i></span>
              <input type="number" step="0.01" class="form-control" formControlName="amountDisbursed" placeholder="0.00"
                [class.is-invalid]="form.get('amountDisbursed')!.invalid && form.get('amountDisbursed')!.touched">
            </div>
            <div class="invalid-feedback d-block" *ngIf="form.get('amountDisbursed')!.invalid && form.get('amountDisbursed')!.touched">
              <span *ngIf="form.get('amountDisbursed')!.errors?.['required']">Amount is required.</span>
              <span *ngIf="form.get('amountDisbursed')!.errors?.['min']">Amount must be at least 0.</span>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Payment Term (months)</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-calendar-range"></i></span>
              <input type="number" class="form-control" formControlName="paymentTerm" placeholder="12"
                [class.is-invalid]="form.get('paymentTerm')!.invalid && form.get('paymentTerm')!.touched">
            </div>
            <div class="invalid-feedback d-block" *ngIf="form.get('paymentTerm')!.invalid && form.get('paymentTerm')!.touched">
              <span *ngIf="form.get('paymentTerm')!.errors?.['required']">Payment term is required.</span>
              <span *ngIf="form.get('paymentTerm')!.errors?.['min']">Must be at least 1 month.</span>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label">Loan Type</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-tags"></i></span>
              <select class="form-select" formControlName="loanTypeId"
                [class.is-invalid]="form.get('loanTypeId')!.invalid && form.get('loanTypeId')!.touched">
                <option [ngValue]="null" disabled>Select a loan type</option>
                <option *ngFor="let lt of loanTypes" [ngValue]="lt.id">{{ lt.creditName }}</option>
              </select>
            </div>
            <div class="invalid-feedback d-block" *ngIf="form.get('loanTypeId')!.invalid && form.get('loanTypeId')!.touched">
              Loan type is required.
            </div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
              <i class="bi bi-check-lg me-1"></i>{{ isEditMode ? 'Save Changes' : 'Create' }}
            </button>
            <button type="button" class="btn btn-outline-secondary" (click)="cancel()">
              <i class="bi bi-x-lg me-1"></i>Cancel
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
