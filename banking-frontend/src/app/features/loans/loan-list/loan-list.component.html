<div class="page-header">
  <h3><i class="bi bi-credit-card me-2"></i>Loans</h3>
  <button class="btn btn-primary" (click)="create()">
    <i class="bi bi-plus-lg me-1"></i>Create
  </button>
</div>

<div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

<div class="table-wrapper">
  <table class="table table-hover">
    <thead>
      <tr>
        <th>#</th>
        <th>Amount Disbursed (EUR)</th>
        <th>Payment Term (months)</th>
        <th>Loan Type</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let loan of loans; let i = index">
        <td class="text-muted">{{ i + 1 }}</td>
        <td class="fw-semibold">{{ loan.amountDisbursed | number:'1.2-2' }}</td>
        <td>{{ loan.paymentTerm }} months</td>
        <td><span class="badge-active">{{ loan.loanType.creditName ?? loan.loanType.id }}</span></td>
        <td>
          <button class="btn btn-outline-secondary btn-sm me-1" (click)="viewPaymentPlans(loan.id)" title="View Payment Plans">
            <i class="bi bi-list-check"></i>
          </button>
          <button class="btn btn-outline-primary btn-sm me-1" (click)="edit(loan.id)" title="Edit">
            <i class="bi bi-pencil"></i>
          </button>
          <button class="btn btn-outline-danger btn-sm" (click)="delete(loan.id)" title="Delete">
            <i class="bi bi-trash"></i>
          </button>
        </td>
      </tr>
      <tr *ngIf="loans.length === 0">
        <td colspan="5" class="text-center text-muted py-4">
          <i class="bi bi-inbox fs-4 d-block mb-1 opacity-25"></i>No loans found.
        </td>
      </tr>
    </tbody>
  </table>
</div>
