<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" routerLink="/">Banking App</a>
    <div class="navbar-nav ms-auto d-flex flex-row align-items-center gap-3">
      <ng-container *ngIf="authService.isLoggedIn(); else loggedOut">
        <a class="nav-link text-white" routerLink="/people" routerLinkActive="fw-bold">People</a>
        <a class="nav-link text-white" routerLink="/companies" routerLinkActive="fw-bold">Companies</a>
        <span class="text-white-50 small">Welcome, {{ authService.getUsername() }}</span>
        <button class="btn btn-outline-light btn-sm" (click)="logout()">Logout</button>
      </ng-container>
      <ng-template #loggedOut>
        <a class="nav-link text-white" routerLink="/login" routerLinkActive="fw-bold">Login</a>
        <a class="nav-link text-white" routerLink="/register" routerLinkActive="fw-bold">Register</a>
      </ng-template>
    </div>
  </div>
</nav>
