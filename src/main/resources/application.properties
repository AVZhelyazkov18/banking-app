spring.application.name=banking-app

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/banking_app?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate & JPA Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=3f8a2b1c9e4d7f6a0b5c8e2d1f4a7b3c9e6d2f5a8b1c4e7d0f3a6b9c2e5d8f1a
app.jwt.expiration=900000
app.jwt.refresh-expiration=604800000